name: Build and Push to GHCR

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: tgnd-restorer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tgnd-restorer:latest
            ghcr.io/${{ github.repository_owner }}/tgnd-restorer:${{ github.sha }}
